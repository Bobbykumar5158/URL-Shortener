{% extends "base.html" %}

{% block content %}
<div class="error-container">
    <div class="error-graphic">🔍</div>
    <h1 class="error-code">404</h1>
    <h2 class="error-message">Link Not Found</h2>
    <p class="error-description">

    </p>
    <a href="{{ url_for('home') }}" class="back-btn">Go Back Home</a>
</div>
{% endblock %}
